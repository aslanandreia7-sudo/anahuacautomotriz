{% extends "base.html" %}

{% block content %}
<section class="max-w-7xl mx-auto px-4 py-12">
  <h1 class="text-3xl font-bold mb-6">Resultados para "{{ query }}"</h1>
  {% for car in cars %}
    <div class="mb-4">
      <a href="{% url 'car_detail' car.slug %}" class="text-red-400">{{ car.title }}</a>
    </div>
  {% empty %}
    <p>No se encontraron resultados.</p>
  {% endfor %}
</section>
{% endblock %}
